<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" fill="none">
  <defs>
    <!-- Background gradient: deep dark purple-blue -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1500" y2="500" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0a0a1a"/>
      <stop offset="0.35" stop-color="#1a0a2e"/>
      <stop offset="0.7" stop-color="#12082a"/>
      <stop offset="1" stop-color="#0a1a1a"/>
    </linearGradient>
    <!-- Icon gradient -->
    <linearGradient id="iconGrad" x1="250" y1="41" x2="250" y2="459" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a855f7"/>
      <stop offset="1" stop-color="#7e22ce"/>
    </linearGradient>
    <!-- Subtitle gradient (blue-green) -->
    <linearGradient id="subtitleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#6c63ff"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <!-- Gold gradient for "Kindness Income" -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#F7D774"/>
      <stop offset="0.3" stop-color="#FFD700"/>
      <stop offset="0.6" stop-color="#FFAA00"/>
      <stop offset="1" stop-color="#F7D774"/>
    </linearGradient>
    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Ambient orb effects -->
    <radialGradient id="orb1" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#a855f7" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#34d399" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bgGrad)"/>

  <!-- Ambient glow orbs for depth -->
  <circle cx="300" cy="250" r="350" fill="url(#orb1)"/>
  <circle cx="1200" cy="300" r="300" fill="url(#orb2)"/>

  <!-- Subtle grid pattern for tech feel -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="100" x2="1500" y2="100"/>
    <line x1="0" y1="200" x2="1500" y2="200"/>
    <line x1="0" y1="300" x2="1500" y2="300"/>
    <line x1="0" y1="400" x2="1500" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="600" y1="0" x2="600" y2="500"/>
    <line x1="900" y1="0" x2="900" y2="500"/>
    <line x1="1200" y1="0" x2="1200" y2="500"/>
  </g>

  <!-- ===== DUKI Logo Icon (centered-left) ===== -->
  <g transform="translate(260, 100) scale(0.6)">
    <!-- Outer ring -->
    <path fill-rule="evenodd" clip-rule="evenodd" d="M250 475C374.264 475 475 374.264 475 250C475 125.736 374.264 25 250 25C125.736 25 25 125.736 25 250C25 374.264 125.736 475 250 475ZM250 500C388.071 500 500 388.071 500 250C500 111.929 388.071 0 250 0C111.929 0 0 111.929 0 250C0 388.071 111.929 500 250 500Z" fill="#9333ea"/>
    <!-- Inner circle -->
    <circle cx="250" cy="250" r="209" fill="url(#iconGrad)"/>
    <!-- Heart watermark -->
    <g transform="translate(250, 240) scale(18)">
      <g transform="translate(-12, -12)">
        <path d="M 19.414,14.414 C 21,12.828 22,11.5 22,9.5 A 5.5,5.5 0 0 0 12.409,5.824 0.6,0.6 0 0 1 11.591,5.825 5.5,5.5 0 0 0 2,9.5 c 0,2.3 1.5,4 3,5.5 l 5.535,5.362 a 2,2 0 0 0 2.879,0.052 2.12,2.12 0 0 0 -0.004,-3 2.124,2.124 0 1 0 3,-3 2.124,2.124 0 0 0 3.004,0 2,2 0 0 0 0,-2.828 L 17.533,9.704 a 2.41,2.41 0 0 0 -3.409,0 l -1.71,1.71 a 2,2 0 0 1 -2.828,0 2,2 0 0 1 0,-2.828 l 2.823,-2.762" fill="none" stroke="#581c87" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.2"/>
      </g>
    </g>
    <!-- Inner rings -->
    <path fill-rule="evenodd" clip-rule="evenodd" d="M250 459C365.428 459 459 365.428 459 250C459 134.572 365.428 41 250 41C134.572 41 41 134.572 41 250C41 365.428 134.572 459 250 459ZM250 475C374.264 475 475 374.264 475 250C475 125.736 374.264 25 250 25C125.736 25 25 125.736 25 250C25 374.264 125.736 475 250 475Z" fill="#9333ea"/>
    <!-- D letter -->
    <g transform="translate(120, 55) scale(0.35)">
      <path d="M298 950l0-30 111 0q84 0 155-27.5 71-27.5 122.5-77.5 51.5-50 80-118 28.5-68 28.5-149 0-81-28.5-149-28.5-68-80-118-51.5-50-122.5-77.5-71-27.5-155-27.5l-111 0 0-30 111 0 0 0q91 0 167 29.5 76 29.5 132 83.5 56 54 87 127.5 31 73.5 31 161.5 0 88-31 161.5-31 73.5-87 127.5-56 54-132 83.5-76 29.5-167 29.5l0 0-111 0z m-198-519l0-285 30 0 0 285-30 0z m66 0l0-285 30 0 0 285-30 0z m66 0l0-285 30 0 0 285-30 0z m66 453l0-30 111 0q94 0 166-39 72-39 113-108.5 41-69.5 41-158.5 0-90-41-159-41-69-113-108-72-39-166-39l-111 0 0-30 111 0 0 0q103 0 182 43 79 43 124 119 45 76 45 174 0 98-45 174-45 76-124 119-79 43-182 43l0 0-111 0z m0-66l0-30 111 0q76 0 132.5-30 56.5-30 88.5-84.5 32-54.5 32-125.5 0-72-32-126-32-54-88.5-84-56.5-30-132.5-30l-111 0 0-30 111 0 0 0q84 0 148 34 64 34 100 95 36 61 36 141 0 80-36 141-36 61-100 95-64 34-148 34l0 0-111 0z m-288-321l0-30 399 0 0 30-399 0z m0 66l0-30 399 0 0 30-399 0z m0 66l0-30 399 0 0 30-399 0z m90 321l0-285 30 0 0 285-30 0z m66 0l0-285 30 0 0 285-30 0z m66 0l0-285 30 0 0 285-30 0z" fill="#FFD700" stroke="#FFD700" stroke-width="30" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- ===== Text Content (right of icon) ===== -->

  <!-- "Duker News" main title -->
  <text x="590" y="200" font-family="Inter, -apple-system, sans-serif" font-size="80" font-weight="800" fill="#e8e8f0" letter-spacing="-0.02em">Duker News</text>

  <!-- Thin divider line -->
  <line x1="590" y1="225" x2="1150" y2="225" stroke="url(#subtitleGrad)" stroke-width="1.5" opacity="0.35"/>

  <!-- Subtitle line 1: "News about Works that generate DUKI /dju:ki/" -->
  <text x="590" y="268" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="500" fill="#b0b0c8" letter-spacing="0.02em">News about Works that generate DUKI /dju:ki/</text>

  <!-- Subtitle line 2: "Decentralized Universal" in normal + "Kindness Income" in gold -->
  <text x="590" y="310" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="600" letter-spacing="0.06em">
    <tspan fill="#b0b0c8">Decentralized Universal </tspan><tspan fill="url(#goldGrad)">Kindness Income</tspan>
  </text>

  <!-- Footer: Advocated by line -->
  <text x="590" y="370" font-family="Inter, -apple-system, sans-serif" font-size="16" fill="#5a5a78" letter-spacing="0.08em">Advocated By All Lives Matter · World</text>
</svg>
