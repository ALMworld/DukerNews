<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#555"/>
    </marker>
    <style>
      .box { fill: #fff; stroke: #333; stroke-width: 1.5; rx: 8; }
      .box-gov { fill: #EEF2FF; stroke: #6366F1; }
      .box-token { fill: #F0FDF4; stroke: #22C55E; }
      .box-engine { fill: #FFF7ED; stroke: #F97316; }
      .box-ext { fill: #F5F5F5; stroke: #999; stroke-dasharray: 5,3; }
      .box-dist { fill: #FEF3C7; stroke: #D97706; }
      .label { font-weight: 600; font-size: 14px; }
      .sublabel { fill: #666; font-size: 11px; }
      .chain-label { font-size: 13px; font-weight: 700; fill: #fff; }
      .chain-bg-eth { fill: #6366F1; rx: 6; }
      .chain-bg-remote { fill: #22C55E; rx: 6; }
      .chain-bg-world { fill: #D97706; rx: 6; }
      .chain-border { fill: none; stroke-width: 1.5; rx: 12; }
      .chain-border-eth { stroke: #6366F1; stroke-dasharray: 8,4; }
      .chain-border-remote { stroke: #22C55E; stroke-dasharray: 8,4; }
      .chain-border-world { stroke: #D97706; stroke-dasharray: 8,4; }
      .arrow { stroke: #555; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
      .arrow-dash { stroke: #999; stroke-width: 1.2; fill: none; stroke-dasharray: 4,3; marker-end: url(#arrow); }
      .arrow-own { stroke: #6366F1; stroke-width: 1; fill: none; stroke-dasharray: 2,2; marker-end: url(#arrow); }
      .edge-label { font-size: 10px; fill: #777; }
    </style>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#333">Contract Architecture (Reference Implementation)</text>

  <!-- ═══ ETHEREUM CHAIN ═══ -->
  <rect x="20" y="45" width="250" height="280" class="chain-border chain-border-eth"/>
  <rect x="30" y="50" width="120" height="24" class="chain-bg-eth"/>
  <text x="90" y="67" text-anchor="middle" class="chain-label">Ethereum</text>

  <!-- ALMVToken -->
  <rect x="40" y="85" width="210" height="45" class="box box-gov"/>
  <text x="145" y="105" text-anchor="middle" class="label">ALMVToken</text>
  <text x="145" y="120" text-anchor="middle" class="sublabel">Voting wrapper (ERC20Votes)</text>

  <!-- ALMWorldGovernance -->
  <rect x="40" y="150" width="210" height="45" class="box box-gov"/>
  <text x="145" y="170" text-anchor="middle" class="label">Governance</text>
  <text x="145" y="185" text-anchor="middle" class="sublabel">Governor + Timelock</text>

  <!-- GovernanceRelay -->
  <rect x="40" y="215" width="210" height="45" class="box box-gov"/>
  <text x="145" y="235" text-anchor="middle" class="label">GovernanceRelay</text>
  <text x="145" y="250" text-anchor="middle" class="sublabel">Cross-chain sender</text>

  <!-- Governance arrows -->
  <line x1="145" y1="130" x2="145" y2="150" class="arrow"/>
  <line x1="145" y1="195" x2="145" y2="215" class="arrow"/>

  <!-- ═══ EACH CHAIN (Remote) ═══ -->
  <rect x="310" y="45" width="280" height="380" class="chain-border chain-border-remote"/>
  <rect x="320" y="50" width="120" height="24" class="chain-bg-remote"/>
  <text x="380" y="67" text-anchor="middle" class="chain-label">Each Chain</text>

  <!-- ALMToken (LEFT, TOP) -->
  <rect x="330" y="85" width="115" height="45" class="box box-token"/>
  <text x="387" y="105" text-anchor="middle" class="label">ALMToken</text>
  <text x="387" y="120" text-anchor="middle" class="sublabel">Honor · OFT · No burn</text>

  <!-- DUKIToken (RIGHT, TOP) -->
  <rect x="455" y="85" width="115" height="55" class="box box-token"/>
  <text x="512" y="105" text-anchor="middle" class="label">DUKIToken</text>
  <text x="512" y="120" text-anchor="middle" class="sublabel">Stablecoin · OFT</text>
  <text x="512" y="133" text-anchor="middle" class="sublabel">Backed by reserves</text>

  <!-- DukiMinter (MIDDLE, NARROWER) -->
  <rect x="365" y="165" width="170" height="50" class="box box-engine"/>
  <text x="450" y="185" text-anchor="middle" class="label">DukiMinter</text>
  <text x="450" y="202" text-anchor="middle" class="sublabel">Deal engine</text>

  <!-- Stablecoins (tiny block, two lines) -->
  <rect x="375" y="236" width="60" height="36" class="box box-ext"/>
  <text x="405" y="252" text-anchor="middle" font-size="10" font-weight="600">Stable</text>
  <text x="405" y="264" text-anchor="middle" font-size="10" font-weight="600">coins</text>

  <!-- Stablecoins → Minter arrow -->
  <line x1="405" y1="236" x2="430" y2="215" class="arrow"/>

  <!-- Minter → tokens arrows -->
  <line x1="420" y1="165" x2="387" y2="130" class="arrow"/>
  <text x="390" y="152" class="edge-label">mint</text>
  <line x1="480" y1="165" x2="512" y2="140" class="arrow"/>
  <text x="500" y="152" class="edge-label">mint</text>

  <!-- GovernanceExecutor (BOTTOM) -->
  <rect x="330" y="310" width="240" height="45" class="box box-gov"/>
  <text x="450" y="330" text-anchor="middle" class="label">GovernanceExecutor</text>
  <text x="450" y="345" text-anchor="middle" class="sublabel">Permanent anchor</text>

  <!-- Executor → ALMToken ownership (LEFT SIDE, around DukiMinter) -->
  <path d="M 340 310 L 340 130" class="arrow-own"/>
  <text x="325" y="220" text-anchor="middle" class="edge-label" transform="rotate(-90, 325, 220)" fill="#6366F1">owns</text>

  <!-- Executor → DUKIToken ownership (RIGHT SIDE, around DukiMinter) -->
  <path d="M 560 310 L 560 140" class="arrow-own"/>
  <text x="575" y="220" text-anchor="middle" class="edge-label" transform="rotate(90, 575, 220)" fill="#6366F1">owns</text>

  <!-- Executor → DukiMinter ownership (CENTER) -->
  <line x1="450" y1="310" x2="450" y2="215" class="arrow-own"/>

  <!-- ═══ WORLD ID CHAIN ═══ -->
  <rect x="630" y="45" width="250" height="200" class="chain-border chain-border-world"/>
  <rect x="640" y="50" width="140" height="24" class="chain-bg-world"/>
  <text x="710" y="67" text-anchor="middle" class="chain-label">World ID Chain</text>

  <!-- Distribution Pool -->
  <rect x="650" y="85" width="210" height="50" class="box box-dist"/>
  <text x="755" y="105" text-anchor="middle" class="label">Distribution Pool</text>
  <text x="755" y="122" text-anchor="middle" class="sublabel">DUKI → verified humans</text>

  <!-- Human ID Verification -->
  <rect x="650" y="155" width="210" height="50" class="box box-dist"/>
  <text x="755" y="175" text-anchor="middle" class="label">Humanity</text>
  <text x="755" y="192" text-anchor="middle" class="sublabel">Proof of unique personhood</text>

  <!-- Arrow: distribution → human id -->
  <line x1="755" y1="135" x2="755" y2="155" class="arrow"/>

  <!-- ═══ CROSS-CHAIN ARROWS ═══ -->
  <!-- Relay → Executor -->
  <line x1="250" y1="250" x2="330" y2="332" class="arrow-dash"/>
  <text x="278" y="300" class="edge-label">relay</text>

  <!-- ALMToken → ALMVToken (wrap 1:1) -->
  <line x1="330" y1="107" x2="250" y2="107" class="arrow-dash"/>
  <text x="290" y="100" class="edge-label">wrap 1:1</text>

  <!-- DUKIToken → Distribution Pool -->
  <line x1="570" y1="107" x2="650" y2="105" class="arrow-dash"/>
  <text x="605" y="98" class="edge-label">distribute</text>

  <!-- Legend -->
  <rect x="630" y="280" width="12" height="12" fill="#EEF2FF" stroke="#6366F1" stroke-width="1"/>
  <text x="648" y="291" font-size="10" fill="#555">Governance</text>
  <rect x="720" y="280" width="12" height="12" fill="#FFF7ED" stroke="#F97316" stroke-width="1"/>
  <text x="738" y="291" font-size="10" fill="#555">Deal engine</text>
  <rect x="630" y="300" width="12" height="12" fill="#F0FDF4" stroke="#22C55E" stroke-width="1"/>
  <text x="648" y="311" font-size="10" fill="#555">Tokens</text>
  <rect x="720" y="300" width="12" height="12" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="738" y="311" font-size="10" fill="#555">Distribution</text>
  <line x1="630" y1="326" x2="650" y2="326" style="stroke: #6366F1; stroke-width: 1; stroke-dasharray: 2,2;"/>
  <text x="656" y="331" font-size="10" fill="#555">Ownership</text>

  <!-- Footer -->
  <text x="450" y="460" text-anchor="middle" font-size="11" fill="#999">Dashed lines = cross-chain · Dotted purple = ownership · DUKI and ALM implement LayerZero OFT</text>
</svg>
