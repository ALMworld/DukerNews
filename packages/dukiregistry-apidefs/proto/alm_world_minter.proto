syntax = "proto3";

package dukiregistry;

// AlmWorldDukiMinter — DealDukiMinted event indexer.
//
// Mirrors the on-chain event:
//   event DealDukiMinted(
//     uint256 indexed sequence,
//     address yangReceiver,
//     address yinReceiver,
//     address stablecoin,
//     uint256 dukiAmount,
//     uint256 almYangAmount,
//     uint256 almYinAmount,
//     address minter,
//     uint256 agentId
//   );
//
// All amounts are passed as strings because uint256 doesn't fit in proto
// integer types. Stay textual end-to-end and let callers parse to BigInt
// once at the edge.
message DealDukiMintedEvent {
  uint32 chain_eid       = 1;   // Chain (LayerZero EID) where the event was emitted
  uint64 evt_seq         = 2;   // Per-minter monotonic counter (per-chain)
  string tx_hash         = 3;
  uint64 block_number    = 4;
  uint64 evt_time        = 5;   // Unix seconds (block timestamp)

  string yang_receiver   = 6;   // Active receiver — gets ALM (and stablecoin settle in deal mints)
  string yin_receiver    = 7;   // Passive receiver — empty/zero address for taiji mints
  string stablecoin      = 8;   // Stablecoin paid in
  string duki_amount     = 9;   // DUKI minted (d18, uint256 as string)
  string alm_yang_amount = 10;  // ALM minted to yang (d18 as string)
  string alm_yin_amount  = 11;  // ALM minted to yin  (d18 as string; "0" for taiji)
  string minter          = 12;  // msg.sender that paid stablecoin
  uint64 agent_id        = 13;  // dApp agent that originated the payment (0 = direct)
  uint64 duki_d6_amount     = 14;
  uint64 alm_yang_d6_amount = 15;
  uint64 alm_yin_d6_amount  = 16;

  // Compact sortable id: hex-packed (evt_time:08x)(chain_eid:04x)(evt_seq:016x).
  // Lexicographic order = (evt_time, chain_eid, evt_seq) so events near the
  // same time across chains cluster naturally. 28 chars total, no separators.
  string id              = 17;
}

// ── Webhook: external service tells the worker about a tx that contains
// DealDukiMinted events. The worker pulls the receipt and indexes them.
//   → MOVED to BlockchainSyncService.NotifyTx (ContractType = ALM_WORLD_MINTER)
//   → MOVED to BlockchainSyncService.SyncEvents (ContractType = ALM_WORLD_MINTER)

// ── Query: deals that paid this agent.
message GetAgentDealsReq {
  uint64 agent_id = 1;
  uint32 chain_eid = 2;  // 0 = all chains
  string cursor    = 3;  // opaque (server-encoded over (block_number, sequence))
  uint32 limit     = 4;  // server caps at 100, default 20
}

message GetAgentDealsResp {
  repeated DealDukiMintedEvent events = 1;
  string next_cursor = 2;
  bool   has_more    = 3;
}

// ── Query: most recent deals across all agents (market activity feed).
message GetRecentDealsReq {
  uint32 chain_eid = 1;  // 0 = all chains
  string cursor    = 2;
  uint32 limit     = 3;
}

message GetRecentDealsResp {
  repeated DealDukiMintedEvent events = 1;
  string next_cursor = 2;
  bool   has_more    = 3;
}

// ── Query: deals involving a specific wallet (as minter or yang_receiver).
message GetWalletDealsReq {
  string wallet    = 1;  // Wallet address (matches minter OR yang_receiver)
  uint32 chain_eid = 2;  // 0 = all chains
  string cursor    = 3;
  uint32 limit     = 4;
}

message GetWalletDealsResp {
  repeated DealDukiMintedEvent events = 1;
  string next_cursor = 2;
  bool   has_more    = 3;
}

service AlmWorldMinterService {
  // Deals paid to a specific agent (newest first).
  rpc GetAgentDeals(GetAgentDealsReq) returns (GetAgentDealsResp);

  // Most recent deals across all agents (market activity feed).
  rpc GetRecentDeals(GetRecentDealsReq) returns (GetRecentDealsResp);

  // Deals involving a specific wallet (minter or receiver).
  rpc GetWalletDeals(GetWalletDealsReq) returns (GetWalletDealsResp);
}
