syntax = "proto3";

package dukiregistry;

import "duker_registry.proto";
import "dukigen_registry.proto";

// ══════════════════════════════════════════════════════════════════════════
//  DukerRegistry Query + Notify RPCs
// ══════════════════════════════════════════════════════════════════════════

message GetUsernameReq {
  string address    = 1;  // Wallet address (case-insensitive)
  uint32 chain_eid  = 2;  // Optional: 0 = all chains; non-zero filters to that chain
}

message GetUsernameResp {
  repeated DukerIdentity identities = 1;  // empty if address has no identities
}

message GetIdentitiesByTokenReq {
  string token_id = 1;  // uint256 as string
}

// ── Webhook / Notify ──

message NotifyDukerTxReq {
  string tx_hash   = 1;
  uint32 chain_eid = 2;  // Which chain the tx is on
}

message NotifyDukerTxResp {
  repeated DukerRegistryEvent events = 1;
}

// ── Sync Events (catch-up from on-chain checkpoints) ──

message SyncEventsReq {
  uint32 chain_eid       = 1;  // Which chain to sync
  uint64 last_evt_seq    = 2;  // Worker's last indexed evtSeq (0 = full sync)
  uint64 max_block_range = 3;  // Max blocks per eth_getLogs call (0 = use server default)
}

message SyncEventsResp {
  uint64 synced_up_to    = 1;  // Highest evtSeq after sync
  uint32 events_indexed  = 2;  // Number of new events indexed
  uint64 chain_evt_seq   = 3;  // Contract's current worldEvtSeq
}

// ══════════════════════════════════════════════════════════════════════════
//  DukigenRegistry Query + Notify RPCs
// ══════════════════════════════════════════════════════════════════════════

message GetAgentReq {
  uint64 agent_id = 1;
}

message GetAgentsReq {
  uint32 page     = 1;
  uint32 per_page = 2;
}

message GetAgentsResp {
  repeated DukigenAgent agents = 1;
  uint32 total = 2;
}

// ── Ranked listing (default /market view) ──
//
// Server joins dukigen_agent_metrics ⨝ dukigen_agents internally and returns
// the page already ordered by credibility desc for the requested timescale.
// Cursor is opaque (server-encoded compound key over credibility + agent_id)
// so callers don't need to know the schema to paginate.
message ListAgentsRankedReq {
  string timescale = 1;   // 'all' | 'year' | 'month' | 'week' — empty defaults to 'all'
  string cursor    = 2;   // opaque; empty string = start from rank 1
  uint32 limit     = 3;   // server caps at 100, default 50
}

message RankedAgent {
  DukigenAgent agent       = 1;
  uint64       credibility = 2;
}

message ListAgentsRankedResp {
  repeated RankedAgent items       = 1;
  string               next_cursor = 2;  // empty when no more pages
  bool                 has_more    = 3;
}

message NotifyDukigenTxReq {
  string tx_hash   = 1;
  uint32 chain_eid = 2;
}

message NotifyDukigenTxResp {
  repeated DukigenRegistryEvent events = 1;
}

message CheckUsernameReq {
  string username = 1;  // Username to check availability — globally unique (encodes origin chain suffix)
}

message CheckUsernameResp {
  bool available       = 1;  // true if the username is not taken
  DukerIdentity owner  = 2;  // set if the username is taken (who owns it)
}

// ══════════════════════════════════════════════════════════════════════════
//  Services
// ══════════════════════════════════════════════════════════════════════════

service DukerRegistryService {
  // Query username by wallet address (+ optional chain filter)
  rpc GetUsername(GetUsernameReq) returns (GetUsernameResp);

  // Check if a username is available
  rpc CheckUsername(CheckUsernameReq) returns (CheckUsernameResp);

  // Query all chain presences for a given token ID
  rpc GetIdentitiesByToken(GetIdentitiesByTokenReq) returns (GetUsernameResp);

  // Notify worker about a new DukerRegistry tx (pull + index)
  rpc NotifyDukerTx(NotifyDukerTxReq) returns (NotifyDukerTxResp);

  // Catch up on missed events using on-chain block checkpoints
  rpc SyncDukerEvents(SyncEventsReq) returns (SyncEventsResp);
}

service DukigenRegistryService {
  // Query agent by ID
  rpc GetAgent(GetAgentReq) returns (DukigenAgent);

  // List agents (paginated, sorted by created_at DESC).
  rpc GetAgents(GetAgentsReq) returns (GetAgentsResp);

  // List agents ranked by credibility for a given timescale (default /market view).
  rpc ListAgentsRanked(ListAgentsRankedReq) returns (ListAgentsRankedResp);

  // Notify worker about a new DukigenRegistry tx (pull + index)
  rpc NotifyDukigenTx(NotifyDukigenTxReq) returns (NotifyDukigenTxResp);

  // Catch up on missed events using on-chain block checkpoints
  rpc SyncDukigenEvents(SyncEventsReq) returns (SyncEventsResp);
}
