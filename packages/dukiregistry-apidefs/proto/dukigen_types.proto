syntax = "proto3";

package dukiregistry;

// ── Product category for DUKIGEN agents ─────────────────────────────────
// SINGLE SOURCE OF TRUTH → Solidity enum generated via `pnpm gen:sol-enums`.
enum ProductType {
  PRODUCT_TYPE_UNSPECIFIED = 0;
  DIGITAL  = 1;  // Apps, software, SaaS, digital goods
  PHYSICAL = 2;  // Hardware, manufactured goods
  SERVICE  = 3;  // Consulting, professional services
}

// ── DUKI contribution model ─────────────────────────────────────────────
// SINGLE SOURCE OF TRUTH → Solidity enum generated via `pnpm gen:sol-enums`.
enum DukiType {
  DUKI_TYPE_UNSPECIFIED = 0;
  REVENUE_SHARE = 1;  // real-time DUKI minting on each payment
  PROFIT_SHARE  = 2;  // profit-share pledge, contributed separately
}

// ── Per-chain deployed contract entry ───────────────────────────────────
// Mirrors the on-chain ChainContract struct used by DukigenAgent. Posts
// inherit the agent's full deployment list verbatim, so the same shape
// shows up on WorksPostData.
message ChainContractEntry {
  uint32 chain_eid     = 1;
  string contract_addr = 2;
}
