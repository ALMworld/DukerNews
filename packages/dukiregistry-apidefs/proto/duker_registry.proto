syntax = "proto3";

package dukiregistry;

// ── DukerRegistry Event Types ──────────────────────────────────────────────
// THIS IS THE SINGLE SOURCE OF TRUTH for DukerEventType.
// Solidity enum is auto-generated from this via `pnpm gen:sol-enums`.
// Both proto and Solidity use 0 = UNSPECIFIED convention.
enum DukerEventType {
  DUKER_EVENT_TYPE_UNSPECIFIED               = 0;
  USER_MINTED                                = 1;
  IDENTITY_BURNED                            = 2;
  PROFILE_UPDATED                            = 3;
}

// ── DukerRegistry Event Payloads ────────────────────────────────────────

// Data for IDENTITY_BURNED (eventType=2)
message IdentityBurnedPayload {
  uint32 chain_eid = 1;
}

// Data for PROFILE_UPDATED (eventType=3)
message ProfileUpdatedPayload {
  string bio     = 1;
  string website = 2;
}

// ── Event data wrapper (serializable independently) ─────────────────────
message DukerEventData {
  oneof payload {
    IdentityBurnedPayload  identity_burned  = 1;
    ProfileUpdatedPayload  profile_updated  = 2;
  }
}

// ── Indexed DukerEvent row ──────────────────────────────────────────────
// Primary key: (chain_eid, evt_seq) — unique per chain.
message DukerRegistryEvent {
  uint32          chain_eid    = 1;  // PK part 1: which chain (LayerZero EID)
  uint64          evt_seq      = 2;  // PK part 2: event sequence on that chain
  string          token_id     = 3;  // uint256 as string (too large for uint64)
  DukerEventType  event_type   = 4;
  string          ego          = 5;  // Actor wallet address
  string          username     = 6;  // e.g. "alice.30184"
  uint64          evt_time     = 7;
  string          tx_hash      = 8;
  uint64          block_number = 9;
  DukerEventData  event_data   = 10;
}

// ── Identity record (materialized view from events) ─────────────────────
message DukerIdentity {
  string          username           = 1;  // "alice.30184" (PK, encodes origin chain)
  uint32          chain_eid          = 2;  // Chain where this identity lives
  string          token_id           = 3;  // On-chain uint256 as string
  string          ego                = 4;  // Wallet address (case-insensitive)
  string          bio                = 5;  // Short biography (max 480 bytes ≈ 160 CJK chars)
  string          website            = 6;  // Personal/project URL
}
