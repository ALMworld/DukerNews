syntax = "proto3";

package dukiregistry;

import "dukigen_types.proto";

// ── DukigenRegistry Event Types ─────────────────────────────────────────
// SINGLE SOURCE OF TRUTH → Solidity enum generated via `pnpm gen:sol-enums`.
enum DukigenEventType {
  DUKIGEN_EVENT_TYPE_UNSPECIFIED = 0;
  AGENT_CREATED           = 1;
  AGENT_URI_UPDATED       = 2;
  AGENT_APPROX_BPS_SET    = 3;
  AGENT_WORKS_DATA_SET    = 4;
  AGENT_METADATA_SET      = 5;
  AGENT_CREDIBILITY_WALLET_SET = 6;
  AGENT_OP_CONTRACT_SET    = 7;
}

// ── DukigenRegistry Event Payloads ──────────────────────────────────────

// `ChainContractEntry` is defined in dukigen_types.proto so the matching
// post-side type in dukernews-apidefs (which symlinks the same file) gets
// the same shape. Used as a repeated field in agent registrations and in
// the materialized DukigenAgent view.

// Data for AGENT_CREATED (eventType=1)
message AgentCreatedPayload {
  string                      name           = 1;
  string                      agent_uri      = 2;
  string                      agent_uri_hash = 3;
  string                      website        = 4;
  uint32                      approx_bps     = 5;
  string                      credibility_wallet = 6;
  ProductType                 product_type   = 7;
  DukiType                    duki_type      = 8;
  string                      pledge_url     = 9;
  repeated ChainContractEntry op_contracts   = 10;
}

// Data for AGENT_URI_UPDATED (eventType=2)
message AgentURIUpdatedPayload {
  string agent_uri      = 1;
  string agent_uri_hash = 2;
}

// Data for AGENT_APPROX_BPS_SET (eventType=3)
message AgentApproxBpsSetPayload {
  uint32 approx_bps = 1;
}

// Data for AGENT_WORKS_DATA_SET (eventType=4)
message AgentWorksDataSetPayload {
  ProductType     product_type = 1;
  DukiType        duki_type    = 2;
  string          pledge_url   = 3;
  string          website      = 4;
}

// Data for AGENT_METADATA_SET (eventType=5)
message AgentMetadataSetPayload {
  string key   = 1;
  bytes  value = 2;
}

// Data for AGENT_CREDIBILITY_WALLET_SET (eventType=6)
message AgentCredibilityWalletSetPayload {
  string credibility_wallet = 1;
}

// Data for AGENT_OP_CONTRACT_SET (eventType=7)
message AgentOpContractSetPayload {
  uint32 chain_eid     = 1;
  string contract_addr = 2;
}

// ── Event data wrapper (serializable independently) ─────────────────────
message DukigenEventData {
  oneof payload {
    AgentCreatedPayload           agent_created          = 1;
    AgentURIUpdatedPayload        agent_uri_updated       = 2;
    AgentApproxBpsSetPayload      agent_approx_bps_set    = 3;
    AgentWorksDataSetPayload      agent_works_data_set    = 4;
    AgentMetadataSetPayload       agent_metadata_set      = 5;
    AgentCredibilityWalletSetPayload agent_credibility_wallet_set = 6;
    AgentOpContractSetPayload     agent_op_contract_set    = 7;
  }
}

// ── Indexed DukigenEvent row ────────────────────────────────────────────
// Primary key: (chain_eid, evt_seq)
message DukigenRegistryEvent {
  uint32              chain_eid    = 1;  // PK part 1
  uint64              evt_seq      = 2;  // PK part 2
  uint64              agent_id     = 3;
  DukigenEventType    event_type   = 4;
  string              ego          = 5;
  uint64              evt_time     = 6;
  string              tx_hash      = 7;
  uint64              block_number = 8;
  DukigenEventData    event_data   = 9;
}

// ── Agent record (materialized view from events) ────────────────────────
message DukigenAgent {
  uint64                      agent_id          = 1;
  string                      name              = 2;
  string                      agent_uri         = 3;
  string                      agent_uri_hash    = 4;
  string                      owner             = 5;
  uint32                      origin_chain_eid  = 6;
  uint32                      approx_bps        = 7;
  ProductType                 product_type      = 8;
  DukiType                    duki_type         = 9;
  string                      pledge_url        = 10;
  string                      website           = 11;
  string                      credibility_wallet = 12;
  repeated ChainContractEntry op_contracts      = 13;

  // these below fields are lazy view, 
  uint64    credibility_d6 = 14; // the amount of ALM token amount in the credibility wallet, on chain
  uint64    credibility_snapshot_ms = 15;
  uint64    mint_credibility_d6 = 16; // 
  string    mint_credibility_snapshot_id = 17;
}

