[profile.default]
src = "src"
out = "out"
libs = ["lib", "../../node_modules"]
via_ir = true
optimizer = true
optimizer_runs = 200
solc = "0.8.30"
allow_paths = ["../../node_modules"]
fs_permissions = [{ access = "read-write", path = "./" }]

[fmt]
line_length = 120
tab_width = 4
quote_style = "double"
bracket_spacing = true
int_types = "long"
