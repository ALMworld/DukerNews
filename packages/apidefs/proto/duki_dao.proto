syntax = "proto3";

// A 128 bit unsigned integer encoded in protobuf.
//
// Protobuf does not support integers larger than 64 bits,
// so this message encodes a u128 by splitting it into its
// upper 64 and lower 64 bits, each encoded as a uint64.
//
// A native u128 x can then be constructed by casting both
// integers to u128, left shifting hi by 64 positions and
// adding lo:
//
// x = (hi as u128) << 64 + (lo as u128)
message Uint128 {
    uint64 lo = 1;
    uint64 hi = 2;
}


// import "proto/rpc_types.proto";

// EvolveParticipation represents a participant's data in the DAO
message Participation {
  uint64 participant_no = 1; // participantNo
  Uint128 participant_amount = 2; // participantAmount
  Uint128 alm_world_amount = 3; // almWorldAmount
}

// DaoFairDrop represents fair drop data for the DAO
message DaoFairDrop {
  Uint128 unitAmount = 1; // unitAmount - how much money
  uint64 unitLeft = 2; // unitLeft
  uint64 unitTotal = 3; // unitTotal - current evolution total
}

// ClaimData represents claim information
message ClaimData {
  uint64 latestClaimedRound = 1; // latestClaimedRound
  Uint128 totalClaimedAmount = 2; // totalClaimedAmount
}


///////////////////////// LOCAL TYPES ///////////////////
message YoulanguaDaoWorldAgg {
  uint64 evolveNum = 1; // evolveNum
  uint64 bornSeconds = 2; // bornSeconds
  uint64 worldEvtSeq = 3; // daoMutationSeq

  repeated uint64 luckYinyangNoPair = 6; // luckYinyangNoPair
  Uint128 daoTotalClaimedAmount = 7; // daoTotalClaimedAmount
  Uint128 daoStableCoinBalance = 8; // daoStableCoinBalance
  repeated uint32 bpsArr = 9; // bpsArr
  repeated uint64 bpsNumArr = 10; // bpsNumArr
  repeated DaoFairDrop fairDrops = 11; // fairDrops
  int64 lastCheckMsTime = 12;
}

message YoulanguaDaoEgoAgg {
  uint64 egoEvtSeq = 1; // egoEvtSeq
  uint64 worldEvtSeq = 2; // egoEvtSeq
  uint64 wordCount = 3; // the number of the world evolve, it is a global number that incrementing by 1 each time when a wille is created.
  uint64 videoCount = 4; // the number of the world worstellung, it is a global number that incrementing by 1 each time when a wille's manifest is added.
  Participation participation = 5; // participation
  repeated ClaimData fairnessClaimDataArr = 6; // fairnessClaimDataArr
  string ego = 7; // ego
  int64 lastCheckMsTime = 8;
}


